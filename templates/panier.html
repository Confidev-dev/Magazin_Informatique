<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Mon Panier</title>
</head>
<body>
    <h2>📦 Votre Panier</h2>
    {% if articles %}
        <table border="1" style="width: 100%; border-collapse: collapse;">
            <tr>
                <th style="padding: 10px;">Produit</th>
                <th style="padding: 10px;">Quantité</th>
                <th style="padding: 10px;">Actions</th>
            </tr>
            {% for a in articles %}
            <tr>
                <td style="padding: 10px;">{{ a.nom }}</td>
                <td style="padding: 10px;">
                    <form action="{{ url_for('modifier_panier', id_panier=a.id) }}" method="POST" style="display:inline;">
                        <input type="number" name="quantite" value="{{ a.quantite }}" min="1" style="width:50px;">
                        <button type="submit">Modifier</button>
                    </form>
                </td>
                <td style="padding: 10px;">
                    <form action="{{ url_for('supprimer_panier', id_panier=a.id) }}" method="POST">
                        <button type="submit" style="color: red;">Supprimer</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
        <form action="{{ url_for('valider_commande') }}" method="POST" style="margin-top: 20px;">
            <button type="submit" style="background:#28a745; color:white; padding:10px;">✅ Valider la commande</button>
        </form>
    {% else %}
        <p>Votre panier est vide.</p>
    {% endif %}
    <p><a href="{{ url_for('commander', id_client=session['user_id']) }}">🛒 Continuer mes achats</a></p>
</body>
</html>
