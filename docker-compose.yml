services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ton_mot_de_passe
      MYSQL_DATABASE: magasin_informatique
    volumes: # < -- à décommenter lors de l'initialisation
       - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  web:
    build: .
    volumes:
      - .:/app  # <-- C'est ici l'ajout crucial
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - MAIL_SERVER=smtp.gmail.com
      - MAIL_PORT=465
      - MAIL_USERNAME=your-email@gmail.com
      - MAIL_PASSWORD=your-password
      - MAIL_USE_TLS=False
      - MAIL_USE_SSL=True
      - MAIL_DEFAULT_SENDER=your-email@gmail.com

  adminer: # <-- Service de gestion de la base de donnée (GUI)
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
